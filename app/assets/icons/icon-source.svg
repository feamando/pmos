    </clipPath>
  </defs>

  <!-- Background with macOS-standard padding -->
  <rect x="56" y="56" width="400" height="400" rx="62" fill="#067A45"/>

  <!-- Lime body - actual HelloFresh lime shape -->
  <path transform="translate(108, 124) scale(0.485)" d="M602.5408,86.1364049 C608.10727,95.7149667 608.230029,107.517369 602.864,117.209816 C583.728916,146.965487 575.125619,182.286918 578.432,217.51708 L578.432,217.449828 C585.0144,316.101423 530.0064,419.649571 429.8912,477.94384 C329.776,536.234908 212.6432,532.808282 130.2624,478.276896 L130.2624,478.34735 C101.316151,458.033914 66.397179,448.026056 31.0944,449.925571 C20.0149295,449.789938 9.82210969,443.836493 4.25481707,434.249048 C-1.31247555,424.661603 -1.43476739,412.851374 3.9328,403.150528 C23.0618887,373.392888 31.6574056,338.071015 28.3424,302.843264 L28.3424,302.913718 C21.7952,204.262123 76.8032,100.723583 176.9184,42.4677423 C277.0336,-15.7913006 394.1664,-12.3999018 476.5472,42.1314847 C505.500072,62.4374804 540.420886,72.4403878 575.7248,70.540454 C586.779768,70.6662458 596.958609,76.5861707 602.5408,86.1364049 Z" fill="white"/>

  <!-- Pixelated grid overlay on lime -->
