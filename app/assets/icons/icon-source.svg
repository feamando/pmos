    <rect width="512" height="512" fill="url(#pixelGrid)"/>
    <rect width="512" height="512" fill="url(#pixelDots)"/>
  </g>

  <!-- "AI" text on the lime -->
  <text x="256" y="285" text-anchor="middle" font-family="Agrandir, Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="900" font-size="100" fill="#067A45" letter-spacing="-3">AI</text>
</svg>
