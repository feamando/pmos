<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Pixelated grid pattern -->
    <pattern id="pixelGrid" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="none"/>
      <rect x="0.5" y="0.5" width="9" height="9" rx="1" fill="rgba(0,0,0,0.06)"/>
    </pattern>
    <!-- Smaller pixel dots for inner texture -->
    <pattern id="pixelDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <rect x="2" y="2" width="7" height="7" rx="1" fill="rgba(150,220,20,0.12)"/>
      <rect x="12" y="12" width="7" height="7" rx="1" fill="rgba(150,220,20,0.12)"/>
    </pattern>
    <!-- Clip path using the lime shape -->
